name: Build and Release Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build Windows executable
        shell: bash
        run: pyinstaller --onefile --windowed --name InstaDownloader gui_app.py

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstaDownloader-windows
          path: dist/InstaDownloader.exe

      - name: Attach Windows executable to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InstaDownloader.exe
          generate_release_notes: true
          overwrite_files: true

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set app version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi

      - name: Build macOS app bundle
        run: pyinstaller --windowed --name InstaDownloader gui_app.py

      - name: Package macOS app
        run: |
          pkgbuild \
            --component "dist/InstaDownloader.app" \
            --install-location "/Applications" \
            --identifier "com.shubhankar.instadownloader" \
            --version "$APP_VERSION" \
            "dist/InstaDownloader-macOS.pkg"
          ditto -c -k --sequesterRsrc --keepParent "dist/InstaDownloader.app" "dist/InstaDownloader-macOS.app.zip"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InstaDownloader-macos
          path: |
            dist/InstaDownloader-macOS.pkg
            dist/InstaDownloader-macOS.app.zip

      - name: Attach macOS artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/InstaDownloader-macOS.pkg
            dist/InstaDownloader-macOS.app.zip
          generate_release_notes: true
          overwrite_files: true
